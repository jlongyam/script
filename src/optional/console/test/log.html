<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta id="meta_ie" http-equiv="x-ua-compatible" content="ie=edge">
  <meta http-equiv="content-type" content="text/html">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>console</title>
  <script src="../../../script.js"></script>
</head>
<body>
  <script>
    console.log('Normal text');
    console.log('<u>HTML text</u>');
    console.log(navigator.userAgent);
    var doc_name = location.href.split('/').pop();
    var doc_type = doc_name.split('.').pop()
    if( doc_type !== 'hta' ) {
      console.dev = true;
      console.log('log to dev console');
      console.dev = false
      console.log('log to dev disabled');
    }
    console.html = false;
    console.log('<b>HTML text</b>');
  </script>
</body>
</html>
