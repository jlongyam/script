<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta id="meta_ie" http-equiv="x-ua-compatible" content="ie=edge">
  <meta http-equiv="content-type" content="text/html">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>normal</title>
  <script src="../../script.js"></script>
</head>
<body>
  <pre id=pre>No &lt;base&gt; element</pre>
  <script>
    var test_load_js = script.test({
      name: "script.load 'other.js'",
      call: function() {
        script.load('sample/other.js');
        return document.scripts[1].getAttribute('src')    
      },
      should: 'sample/other.js'
    });
    document.write('<pre>'+test_load_js+'</pre>');
    var test_load_css = script.test({
      name: "script.load 'pre.css'",
      call: function() {
        script.load('sample/pre.css');
        return document.getElementsByTagName('link')[0].getAttribute('href');
      },
      should: 'sample/pre.css'
    })
    document.write('<pre>'+test_load_css+'</pre>');
  </script>
</body>
</html>
