<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=9">
  <meta http-equiv="content-type" content="text/html">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Index</title>
  <script src="src/script.js"></script>
</head>
<body>
  <dl>
    <dt><h1><a href="index.html">Index</a></h1></dt>
    <dd>
      <li><a href="#/Home">Home</li>
      <li><a href="#/Next/page">Next/page</li>
      <li><a href="#/Other">Other</li>
    </dd>
  </dl>
  <div id="root"></div>
  <script>
    window.addEventListener('hashchange', function() {
      return router(function(url, rest){
        switch(url) {
          case 'Home': root.innerHTML = 'HOME'; break;
          case 'Next': root.innerHTML = 'Next'; break;
          default: root.innerHTML = '404'; break;
        }
      })
    }, false );
  </script>
</body>
</html>
